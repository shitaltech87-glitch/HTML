<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>
    <form>
        <label for="#">Name:</label>
    <input type="text" name="#" id="#" placeholder="Enter your name"> <br><br>

    <label for="#">Mobile:</label>
    <input type="tel" name="#" id="#" placeholder="Enter mobile NO."> <br><br>

    <label for="#">Email:</label>
    <input type="email" name="#" id="#" placeholder="Enter Your Email"> <br><br>

    <label for="#">Password:</label>
    <input type="password" name="#" id="#" placeholder="Enter Password"> <br><br>

    <label for="#">Confirm Password:</label>
    <input type="password" name="#" id="#" placeholder="Re-Enter Passwod"> <br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset"> 
    </form>
    
</body>
</html>
