<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
      <table border="1" cellpadding="15" cellspacing="0">
        <thead>
            <tr>
                <th>subject</th>
                <th>obtained marks</th>
                <th>full marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>sanskrit</td>
                <td>99</td>
                <td>100</td>
            </tr>
            <tr>
                <td>english</td>
                <td>93</td>
                <td>100</td>
            </tr>
            <tr>
                <td>math</td>
                <td>87</td>
                <td>100</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">percentage</td>
                <td>86.40</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
